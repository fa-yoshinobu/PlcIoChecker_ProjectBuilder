name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  VT_API_KEY: ${{ secrets.VT_API_KEY }}

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish single-file app
        shell: cmd
        run: build-dotnet-onefile.bat

      - name: Package release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "dotnet/publish/win-x64/PlcIoCheckerProjectBuilder.exe" -DestinationPath "artifacts/PlcIoCheckerProjectBuilder-win-x64.zip" -Force

      - name: Publish GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/PlcIoCheckerProjectBuilder-win-x64.zip

      - name: VirusTotal GitHub Action analysis
        if: env.VT_API_KEY != ''
        uses: cssnr/virustotal-action@v1
        with:
          vt_api_key: ${{ env.VT_API_KEY }}
          file_globs: artifacts/PlcIoCheckerProjectBuilder-win-x64.zip
          release_id: ${{ steps.release.outputs.id }}
          release_heading: "### VirusTotal GitHub Action analysis:"
